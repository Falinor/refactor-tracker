name: Feature request
description: Propose a new capability or an improvement
labels: ['enhancement']
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      description: Start with the use case, not the proposed solution. What can you not do today?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed approach
      description: Optional. If you have an idea for the shape (config syntax, reporter API, CLI flag), describe it here. Otherwise leave blank and we'll discuss.
    validations:
      required: false

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Workarounds you tried, prior art in other tools, why those don't fit.
    validations:
      required: false

  - type: dropdown
    id: area
    attributes:
      label: Area
      multiple: true
      options:
        - CLI / configuration
        - detection (counts / binary)
        - cache and deltas
        - built-in reporter (stdout / json / markdown / html)
        - custom reporters / plugin API
        - milestones / state
        - docs
        - other
    validations:
      required: false
