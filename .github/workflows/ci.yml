name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  commitlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Validate pushed commit
        if: github.event_name == 'push'
        run: pnpm exec commitlint --last --verbose
      - name: Validate PR commits
        if: github.event_name == 'pull_request'
        run: pnpm exec commitlint --from ${{ github.event.pull_request.base.sha }} --to ${{ github.event.pull_request.head.sha }} --verbose

  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm format:check
      - run: pnpm lint

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm -r test
      - run: pnpm -r build

  release:
    needs: [test, commitlint, quality]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      # The rest only runs after a Release PR is merged (i.e., new tags exist).
      - uses: actions/checkout@v6
        if: ${{ steps.release.outputs.releases_created == 'true' }}

      - uses: pnpm/action-setup@v6
        if: ${{ steps.release.outputs.releases_created == 'true' }}

      - uses: actions/setup-node@v6
        if: ${{ steps.release.outputs.releases_created == 'true' }}
        with:
          node-version: 24
          cache: pnpm
          registry-url: 'https://registry.npmjs.org'

      - run: pnpm install --frozen-lockfile
        if: ${{ steps.release.outputs.releases_created == 'true' }}

      - run: pnpm -r build
        if: ${{ steps.release.outputs.releases_created == 'true' }}

      - name: Publish released packages
        if: ${{ steps.release.outputs.releases_created == 'true' }}
        run: |
          for path in $(echo '${{ steps.release.outputs.paths_released }}' | jq -r '.[]'); do
            pkg=$(jq -r '.name' "$path/package.json")
            echo "Publishing $pkg from $path"
            pnpm --filter "$pkg" publish --no-git-checks --access public
          done
